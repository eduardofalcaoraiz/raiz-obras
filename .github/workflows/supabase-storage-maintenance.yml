name: Supabase Storage Maintenance

run-name: Supabase storage maintenance ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'scheduled' }}

on:
  schedule:
    - cron: "24 4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "maintenance or dry-run"
        required: true
        default: "maintenance"
      buckets:
        description: "Buckets separados por virgula"
        required: false
        default: "pagamentos,documentos"
      scan_limit:
        description: "Quantidade maxima de objetos analisados por bucket"
        required: false
        default: "1200"
      dedupe_limit:
        description: "Quantidade maxima de duplicatas removidas por execucao"
        required: false
        default: "40"
      compress_limit:
        description: "Quantidade maxima de arquivos compactados por execucao"
        required: false
        default: "4"

concurrency:
  group: supabase-storage-maintenance
  cancel-in-progress: true

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maintenance dependencies
        run: python -m pip install --upgrade requests pymupdf pillow

      - name: Run storage maintenance
        env:
          SUPABASE_URL: https://hjccxfznojjosvanwztv.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STORAGE_MAINTENANCE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run' && 'true' || 'false' }}
          STORAGE_MAINTENANCE_BUCKETS: ${{ github.event_name == 'workflow_dispatch' && inputs.buckets || 'pagamentos,documentos' }}
          STORAGE_MAINTENANCE_SCAN_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.scan_limit || '1200' }}
          STORAGE_DEDUPE_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.dedupe_limit || '40' }}
          STORAGE_COMPRESS_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.compress_limit || '4' }}
          STORAGE_MAINTENANCE_MIN_BYTES: "120000"
          STORAGE_COMPRESS_MIN_SAVING_RATIO: "0.08"
          STORAGE_COMPRESS_JPEG_QUALITY: "84"
          STORAGE_COMPRESS_MAX_IMAGE_DIM: "2200"
        run: python scripts/supabase_storage_maintenance.py
