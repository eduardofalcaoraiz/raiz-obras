name: Zeev CAPEX Sync

run-name: Zeev CAPEX ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'incremental' }} ${{ github.event_name == 'workflow_dispatch' && inputs.start || '' }} ${{ github.event_name == 'workflow_dispatch' && inputs.end || '' }} ${{ github.event_name == 'workflow_dispatch' && format('p{0}', inputs.start_page) || '' }}

on:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "7,27,47 * * * *"
    - cron: "17 * * * *"
    - cron: "43 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "incremental, retro, deep-incremental, deep-retro, read-test, inspect-docs, rescue-docs, rescue-docs-loop, doc-rescue-audit, backfill-docs, reconcile-registered, register-obra-payments, register-capex-items, force-pending-ticket, probe-zeev-ticket ou refresh-payment-statuses"
        required: true
        default: "incremental"
      start:
        description: "Inicio ISO para retro"
        required: false
      end:
        description: "Fim ISO para retro"
        required: false
      flow_ids:
        description: "Fluxos Zeev separados por virgula"
        required: false
        default: "299,275,263,102,300"
      max_pages:
        description: "Paginas da varredura"
        required: false
        default: "2"
      start_page:
        description: "Pagina inicial da varredura profunda"
        required: false
        default: "1"
      notify:
        description: "Enviar email quando encontrar novos tickets"
        required: false
        default: "false"
      ticket_ids:
        description: "IDs especificos do Ticket Raiz separados por virgula"
        required: false
      extra_ticket_ids:
        description: "IDs adicionais para atualizar junto com a janela incremental"
        required: false
      backfill_limit:
        description: "Quantidade de registros para reparar anexos/status em backfill-docs"
        required: false
        default: "2"
      backfill_batch:
        description: "Tamanho dos micro-lotes do backfill-docs"
        required: false
        default: "2"
      backfill_stale_hours:
        description: "Horas antes de rechecagem de anexos/status no Zeev"
        required: false
        default: "8"
      checked_before:
        description: "Marco ISO para varredura total finita de anexos; recheca registros ainda nao verificados depois desse horario"
        required: false
      target_obra:
        description: "Obra destino para register-obra-payments"
        required: false
      target_escopo:
        description: "Escopo financeiro: obra ou extra"
        required: false
        default: "obra"
      target_unidade:
        description: "Unidade destino para register-capex-items"
        required: false
      target_ano:
        description: "Ano destino para register-capex-items"
        required: false
      force_reason:
        description: "Motivo para force-pending-ticket"
        required: false

concurrency:
  group: zeev-capex-sync-global
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Zeev CAPEX
        env:
          ZEEV_TOKEN: ${{ secrets.ZEEV_TOKEN }}
          ZEEV_EXTRA_TOKENS: ${{ secrets.ZEEV_EXTRA_TOKENS }}
          ZEEV_SYNC_SECRET: ${{ secrets.ZEEV_SYNC_SECRET }}
          ZEEV_AUTOMATION_PAUSED: "false"
          ZEEV_TOTAL_SCAN_LOCK: "1"
          ZEEV_BASE_URL: https://raizeducacao.zeev.it
          SUPABASE_URL: https://hjccxfznojjosvanwztv.supabase.co
          ZEEV_BUSINESS_TIMEZONE: America/Sao_Paulo
          ZEEV_FLOW_IDS: ${{ github.event_name == 'workflow_dispatch' && inputs.flow_ids || '299,275,263,102,300' }}
          ZEEV_SYNC_MODE: ${{ github.event_name == 'schedule' && (github.event.schedule == '17 * * * *' || github.event.schedule == '7,27,47 * * * *') && 'rescue-docs-loop' || github.event_name == 'schedule' && github.event.schedule == '43 * * * *' && 'refresh-payment-statuses' || github.event_name == 'workflow_dispatch' && inputs.mode || 'incremental' }}
          ZEEV_SYNC_START: ${{ github.event_name == 'workflow_dispatch' && inputs.start || '' }}
          ZEEV_SYNC_END: ${{ github.event_name == 'workflow_dispatch' && inputs.end || '' }}
          ZEEV_MAX_PAGES: ${{ github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *' && '2' || github.event_name == 'workflow_dispatch' && inputs.max_pages || '8' }}
          ZEEV_START_PAGE: ${{ github.event_name == 'workflow_dispatch' && inputs.start_page || '1' }}
          ZEEV_RECORDS_PER_PAGE: "30"
          ZEEV_DEEP_SCAN: ${{ github.event_name == 'schedule' && github.event.schedule == '*/30 * * * *' && '0' || github.event_name == 'workflow_dispatch' && inputs.mode == 'incremental' && '0' || '1' }}
          ZEEV_INCREMENTAL_MAX_PAGES_CAP: "2"
          ZEEV_INCREMENTAL_EXTRA_TICKET_CAP: "5"
          ZEEV_ENRICH_CONCURRENCY: "4"
          ZEEV_SYNC_OVERLAP_HOURS: "72"
          ZEEV_NOTIFY: ${{ github.event_name == 'workflow_dispatch' && inputs.notify || 'false' }}
          ZEEV_TICKET_IDS: ${{ github.event_name == 'workflow_dispatch' && inputs.ticket_ids || '' }}
          ZEEV_EXTRA_TICKET_IDS: ${{ github.event_name == 'workflow_dispatch' && inputs.extra_ticket_ids || '' }}
          ZEEV_TARGET_OBRA: ${{ github.event_name == 'workflow_dispatch' && inputs.target_obra || '' }}
          ZEEV_TARGET_ESCOPO: ${{ github.event_name == 'workflow_dispatch' && inputs.target_escopo || 'obra' }}
          ZEEV_TARGET_UNIDADE: ${{ github.event_name == 'workflow_dispatch' && inputs.target_unidade || '' }}
          ZEEV_TARGET_ANO: ${{ github.event_name == 'workflow_dispatch' && inputs.target_ano || '' }}
          ZEEV_FORCE_PENDING_REASON: ${{ github.event_name == 'workflow_dispatch' && inputs.force_reason || '' }}
          ZEEV_AI_SUMMARY_ENABLED: "1"
          ZEEV_BACKFILL_LIMIT: ${{ github.event_name == 'schedule' && (github.event.schedule == '17 * * * *' || github.event.schedule == '7,27,47 * * * *') && '160' || github.event_name == 'workflow_dispatch' && inputs.backfill_limit || '1' }}
          ZEEV_STATUS_REFRESH_LIMIT: ${{ github.event_name == 'schedule' && github.event.schedule == '43 * * * *' && '40' || github.event_name == 'workflow_dispatch' && inputs.backfill_limit || '40' }}
          ZEEV_STATUS_REFRESH_BATCH: ${{ github.event_name == 'schedule' && github.event.schedule == '43 * * * *' && '4' || github.event_name == 'workflow_dispatch' && inputs.backfill_batch || '4' }}
          ZEEV_STATUS_ONLY_OVERDUE: ${{ github.event_name == 'schedule' && github.event.schedule == '43 * * * *' && 'false' || 'true' }}
          ZEEV_STATUS_REFRESH_PAUSE_SECONDS: "1"
          ZEEV_BACKFILL_BATCH: ${{ github.event_name == 'schedule' && (github.event.schedule == '17 * * * *' || github.event.schedule == '7,27,47 * * * *') && '40' || github.event_name == 'workflow_dispatch' && inputs.backfill_batch || '1' }}
          ZEEV_BACKFILL_STALE_HOURS: ${{ github.event_name == 'schedule' && (github.event.schedule == '17 * * * *' || github.event.schedule == '7,27,47 * * * *') && '720' || github.event_name == 'workflow_dispatch' && inputs.backfill_stale_hours || '720' }}
          ZEEV_DOC_RESCUE_CHECKED_BEFORE: ${{ github.event_name == 'workflow_dispatch' && inputs.checked_before || '' }}
          ZEEV_BACKFILL_FILE_LIMIT: "6"
          ZEEV_RESCUE_BLOCK_EMAIL: "true"
          ZEEV_RESCUE_BLOCK_RECENT_HOURS: "24"
          ZEEV_DOC_RESCUE_LIMIT: ${{ github.event_name == 'schedule' && (github.event.schedule == '17 * * * *' || github.event.schedule == '7,27,47 * * * *') && '160' || github.event_name == 'workflow_dispatch' && inputs.backfill_limit || '160' }}
          ZEEV_DOC_RESCUE_BATCH: ${{ github.event_name == 'schedule' && (github.event.schedule == '17 * * * *' || github.event.schedule == '7,27,47 * * * *') && '40' || github.event_name == 'workflow_dispatch' && inputs.backfill_batch || '40' }}
          ZEEV_DOC_RESCUE_FAST_EDGE: "1"
          ZEEV_DOC_RESCUE_EDGE_LIMIT: "80"
          ZEEV_SYNC_IDS_CONCURRENCY: "10"
          ZEEV_INGEST_BACKFILL_LIMIT: "0"
          ZEEV_DIRECT_DOC_RESCUE_ENABLED: "1"
          ZEEV_DIRECT_DOC_RESCUE_FILE_LIMIT: "6"
          ZEEV_DIRECT_DOC_RESCUE_MAX_BYTES: "5500000"
          ZEEV_DOC_RESCUE_LOOP_SECONDS: "3300"
          ZEEV_DOC_RESCUE_LOOP_ROUNDS: "20"
          ZEEV_DOC_RESCUE_MAX_TRANSIENT_RETRIES: "5"
          ZEEV_DIRECT_DOC_TIMEOUT_SECONDS: "20"
          ZEEV_FILE_URL_ATTEMPT_LIMIT: "6"
          ZEEV_FILE_TOKEN_ATTEMPT_LIMIT: "2"
          ZEEV_DOC_CANDIDATE_ATTEMPT_LIMIT: "12"
          ZEEV_EXTRA_DOCUMENT_FIELDS: ${{ secrets.ZEEV_EXTRA_DOCUMENT_FIELDS }}
          ZEEV_FILE_DOWNLOAD_URL_TEMPLATE: ${{ secrets.ZEEV_FILE_DOWNLOAD_URL_TEMPLATE }}
          ZEEV_REGISTER_BATCH: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'register-capex-items' && '6' || github.event_name == 'workflow_dispatch' && inputs.mode == 'register-obra-payments' && '3' || '1' }}
          ZEEV_REGISTER_FILE_LIMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'register-capex-items' && '2' || github.event_name == 'workflow_dispatch' && inputs.mode == 'register-obra-payments' && '2' || '2' }}
          ZEEV_REGISTER_PAUSE_SECONDS: "1"
          ZEEV_SUMMARY_ALLOW_GEMINI_GROQ: "0"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_SUMMARY_MODEL: ${{ secrets.GEMINI_SUMMARY_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_SUMMARY_MODEL: ${{ secrets.GROQ_SUMMARY_MODEL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_SUMMARY_MODEL: ${{ secrets.CLOUDFLARE_SUMMARY_MODEL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_SUMMARY_MODEL: ${{ secrets.MISTRAL_SUMMARY_MODEL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          HF_SUMMARY_MODEL: ${{ secrets.HF_SUMMARY_MODEL }}
        run: python scripts/zeev_capex_sync.py
