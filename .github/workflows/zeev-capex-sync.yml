name: Zeev CAPEX Sync

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "incremental ou retro"
        required: true
        default: "incremental"
      start:
        description: "Inicio ISO para retro"
        required: false
      end:
        description: "Fim ISO para retro"
        required: false
      flow_ids:
        description: "Fluxos Zeev separados por virgula"
        required: false
        default: "299,275,102,300"
      max_pages:
        description: "Paginas por fluxo"
        required: false
        default: "2"
      notify:
        description: "Enviar email quando encontrar novos tickets"
        required: false
        default: "true"
      ticket_ids:
        description: "IDs especificos do Ticket Raiz separados por virgula"
        required: false
      extra_ticket_ids:
        description: "IDs adicionais para atualizar junto com a janela incremental"
        required: false

concurrency:
  group: zeev-capex-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Zeev CAPEX
        env:
          ZEEV_TOKEN: ${{ secrets.ZEEV_TOKEN }}
          ZEEV_SYNC_SECRET: ${{ secrets.ZEEV_SYNC_SECRET }}
          ZEEV_BASE_URL: https://raizeducacao.zeev.it
          SUPABASE_URL: https://hjccxfznojjosvanwztv.supabase.co
          ZEEV_BUSINESS_TIMEZONE: America/Sao_Paulo
          ZEEV_FLOW_IDS: ${{ github.event_name == 'workflow_dispatch' && inputs.flow_ids || '299,275,102,300' }}
          ZEEV_SYNC_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'incremental' }}
          ZEEV_SYNC_START: ${{ github.event_name == 'workflow_dispatch' && inputs.start || '' }}
          ZEEV_SYNC_END: ${{ github.event_name == 'workflow_dispatch' && inputs.end || '' }}
          ZEEV_MAX_PAGES: ${{ github.event_name == 'workflow_dispatch' && inputs.max_pages || '6' }}
          ZEEV_RECORDS_PER_PAGE: "30"
          ZEEV_SYNC_OVERLAP_HOURS: "24"
          ZEEV_NOTIFY: ${{ github.event_name == 'workflow_dispatch' && inputs.notify || 'true' }}
          ZEEV_TICKET_IDS: ${{ github.event_name == 'workflow_dispatch' && inputs.ticket_ids || '' }}
          ZEEV_EXTRA_TICKET_IDS: ${{ github.event_name == 'workflow_dispatch' && inputs.extra_ticket_ids || '' }}
          ZEEV_AI_SUMMARY_ENABLED: "1"
          ZEEV_SUMMARY_ALLOW_GEMINI_GROQ: "0"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_SUMMARY_MODEL: ${{ secrets.GEMINI_SUMMARY_MODEL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_SUMMARY_MODEL: ${{ secrets.GROQ_SUMMARY_MODEL }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_SUMMARY_MODEL: ${{ secrets.CLOUDFLARE_SUMMARY_MODEL }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          MISTRAL_SUMMARY_MODEL: ${{ secrets.MISTRAL_SUMMARY_MODEL }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          HF_SUMMARY_MODEL: ${{ secrets.HF_SUMMARY_MODEL }}
        run: python scripts/zeev_capex_sync.py
