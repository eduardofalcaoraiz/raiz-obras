name: Vercel Production Deploy

run-name: Vercel deploy ${{ github.ref_name }} ${{ github.sha }}

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - vercel.json
      - api/**
      - .github/workflows/vercel-production-deploy.yml
  workflow_dispatch:

concurrency:
  group: vercel-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      APP_URL: https://raiz-obras.vercel.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pre-deploy check
        run: python pre_deploy_check.py

      - name: Deploy with Vercel deploy hook
        if: env.VERCEL_DEPLOY_HOOK_URL != ''
        run: |
          curl --fail --show-error --silent --request POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel deploy hook triggered."

      - name: Deploy with Vercel CLI
        if: env.VERCEL_DEPLOY_HOOK_URL == '' && env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != ''
        run: |
          npm install --global vercel@latest
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
          vercel deploy --prod --yes --token "$VERCEL_TOKEN"

      - name: Missing Vercel credentials
        if: env.VERCEL_DEPLOY_HOOK_URL == '' && (env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '')
        run: |
          echo "::warning::Configure VERCEL_DEPLOY_HOOK_URL or VERCEL_TOKEN + VERCEL_ORG_ID + VERCEL_PROJECT_ID in GitHub Actions secrets."
          echo "Deployment skipped because Vercel credentials are not configured yet."

      - name: Verify production responds
        if: env.VERCEL_DEPLOY_HOOK_URL != '' || (env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '')
        run: |
          for i in $(seq 1 30); do
            code="$(curl --location --silent --output /tmp/raiz-obraviva.html --write-out '%{http_code}' "$APP_URL/?deploy_check=${GITHUB_SHA}")"
            if [ "$code" = "200" ] && grep -q "Raiz ObraViva" /tmp/raiz-obraviva.html; then
              echo "Production is responding."
              exit 0
            fi
            echo "Waiting for Vercel production... attempt $i"
            sleep 10
          done
          echo "::error::Production did not respond with the expected app after deploy."
          exit 1
